services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-spanish_cards}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spanish_cards}
      POSTGRES_DB: ${POSTGRES_DB:-spanish_cards}
    ports:
      # Loopback-only: only host processes (the dev API, migrations, e2e) reach
      # Postgres. Nothing off-box needs it; this keeps the DB off the LAN.
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5434}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spanish_cards} -d ${POSTGRES_DB:-spanish_cards}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    profiles: ["app"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-spanish_cards}:${POSTGRES_PASSWORD:-spanish_cards}@postgres:5432/${POSTGRES_DB:-spanish_cards}
      PORT: ${APP_CONTAINER_PORT:-4100}
      NODE_ENV: production
    command: sh -c "npx --no-install node-pg-migrate -m server/migrations up && node server/dist/index.js"
    ports:
      - "${APP_HOST_PORT:-4100}:${APP_CONTAINER_PORT:-4100}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${APP_CONTAINER_PORT:-4100}/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
